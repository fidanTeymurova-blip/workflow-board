<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WorkFlow Board</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <h1 class="logo">WorkFlow<span>Board</span></h1>
      <div class="header-actions">
        <button id="btn-add-task" class="btn-primary">+ New Task</button>
        <button id="btn-clear-done" class="btn-ghost">Clear Done</button>
      </div>
    </div>
  </header>

  <main class="container">

    <!-- Stats -->
    <section class="stats" aria-label="Board statistics">
      <div class="stat-card">
        <span class="stat-value" id="stat-total">0</span>
        <span class="stat-label">Total Tasks</span>
      </div>
      <div class="stat-card">
        <span class="stat-value" id="stat-progress">0</span>
        <span class="stat-label">In Progress</span>
      </div>
      <div class="stat-card">
        <span class="stat-value" id="stat-done">0</span>
        <span class="stat-label">Completed</span>
      </div>
      <div class="stat-card">
        <span class="stat-value" id="stat-pct">0%</span>
        <span class="stat-label">Done Rate</span>
      </div>
    </section>

    <!-- Board -->
    <section class="board" aria-label="Kanban board">
      <div class="column" id="col-todo" data-status="todo">
        <div class="column-header">
          <span class="col-title">To Do</span>
          <span class="col-badge" id="badge-todo">0</span>
        </div>
        <div class="card-list" id="list-todo"></div>
        <button class="btn-add-inline" data-col="todo">+ Add task</button>
      </div>

      <div class="column" id="col-inprogress" data-status="inprogress">
        <div class="column-header">
          <span class="col-title">In Progress</span>
          <span class="col-badge" id="badge-inprogress">0</span>
        </div>
        <div class="card-list" id="list-inprogress"></div>
        <button class="btn-add-inline" data-col="inprogress">+ Add task</button>
      </div>

      <div class="column" id="col-review" data-status="review">
        <div class="column-header">
          <span class="col-title">Review</span>
          <span class="col-badge" id="badge-review">0</span>
        </div>
        <div class="card-list" id="list-review"></div>
        <button class="btn-add-inline" data-col="review">+ Add task</button>
      </div>

      <div class="column" id="col-done" data-status="done">
        <div class="column-header">
          <span class="col-title">Done</span>
          <span class="col-badge badge-done" id="badge-done">0</span>
        </div>
        <div class="card-list" id="list-done"></div>
        <button class="btn-add-inline" data-col="done">+ Add task</button>
      </div>
    </section>

  </main>

  <!-- Modal -->
  <div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-title">New Task</h2>
        <button class="modal-close" id="modal-close" aria-label="Close">&#x2715;</button>
      </div>
      <div class="modal-body">
        <label for="input-title">Title <span class="required">*</span></label>
        <input type="text" id="input-title" placeholder="Task title..." maxlength="80" />

        <label for="input-desc">Description</label>
        <textarea id="input-desc" placeholder="Optional description..." rows="3"></textarea>

        <div class="form-row">
          <div class="form-group">
            <label for="input-priority">Priority</label>
            <select id="input-priority">
              <option value="low">Low</option>
              <option value="medium" selected>Medium</option>
              <option value="high">High</option>
            </select>
          </div>
          <div class="form-group">
            <label for="input-tag">Tag</label>
            <select id="input-tag">
              <option value="js">Vanilla JS</option>
              <option value="api">REST API</option>
              <option value="dom">DOM</option>
              <option value="event">Event</option>
              <option value="config">Config</option>
              <option value="test">Testing</option>
            </select>
          </div>
          <div class="form-group">
            <label for="input-status">Column</label>
            <select id="input-status">
              <option value="todo" selected>To Do</option>
              <option value="inprogress">In Progress</option>
              <option value="review">Review</option>
              <option value="done">Done</option>
            </select>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-ghost" id="btn-cancel">Cancel</button>
        <button class="btn-primary" id="btn-save">Save Task</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
